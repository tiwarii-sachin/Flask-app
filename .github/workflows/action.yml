name: Flask CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run Tests
        run: |
          if [ -d tests ]; then
            pytest
          else
            echo "No tests found. Skipping..."
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/flask-app:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/flask-app:${{ github.sha }} \
          ${{ secrets.DOCKER_USERNAME }}/flask-app:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/flask-app:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/flask-app:latest

          - name: Run Container
            run: |
              docker run -d --name flask-Container ${{secrets.DOCKER_USERNAME}}/flask-app:latest


       

        - name: Container List
          run: docker ps

        - name: Images List
          run: docker images 
